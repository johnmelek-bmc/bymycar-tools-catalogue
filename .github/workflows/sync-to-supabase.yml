# =============================================================================
# BYmyCAR Tools Catalogue — Build & Deploy
# =============================================================================
# Cette GitHub Action se déclenche à chaque push sur main (merge de PR).
# Elle :
#   1. Valide la structure YAML de tous les fichiers dans /tools/
#   2. Génère dist/tools-catalogue.json (source de vérité pour les projets)
#   3. Publie le JSON sur GitHub Pages (optionnel)
#   4. Déclenche un webhook vers les projets consommateurs (optionnel)
# =============================================================================

name: build-and-deploy

on:
  push:
    branches: [main]
    paths:
      - "tools/**/*.yaml"
      - "tools/**/*.yml"
  workflow_dispatch: # permet un déclenchement manuel

jobs:
  validate-and-build:
    name: Validate & Build JSON
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install yaml

      - name: Validate YAML files
        run: |
          echo "=== Validation des fichiers YAML ==="
          for file in tools/*.yaml tools/*.yml; do
            if [ -f "$file" ]; then
              echo "→ Validation de $file..."
              node -e "
                const fs = require('fs');
                const YAML = require('yaml');
                try {
                  const doc = YAML.parse(fs.readFileSync('$file', 'utf8'));
                  if (!doc.tool) throw new Error('Structure tool manquante');
                  if (!doc.tool.id) throw new Error('id manquant');
                  if (!doc.tool.name) throw new Error('name manquant');
                  if (!doc.tool.display_name) throw new Error('display_name manquant');
                  if (!doc.tool.team || !doc.tool.team.name) throw new Error('team.name manquant');
                  if (!doc.tool.description_fr) throw new Error('description_fr manquante');
                  if (!doc.tool.access_url) throw new Error('access_url manquante');
                  if (!doc.tool.use_cases || doc.tool.use_cases.length === 0) throw new Error('use_cases manquants');
                  if (!doc.tool.features || doc.tool.features.length === 0) throw new Error('features manquantes');
                  console.log('  ✅ OK');
                } catch (e) {
                  console.error('  ❌ Erreur:', e.message);
                  process.exit(1);
                }
              "
            fi
          done

      - name: Generate tools-catalogue.json
        run: node scripts/generate-json.js

      - name: Upload dist/ as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tools-catalogue
          path: dist/
          retention-days: 90

      - name: Deploy JSON to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: .
          keep_files: false
          publish_branch: gh-pages

      - name: Sync to Lovable project (BYmAIcar Portal)
        if: success()
        env:
          LOVABLE_CLIENT_ID: ${{ secrets.LOVABLE_CLIENT_ID }}
          LOVABLE_REFRESH_TOKEN: ${{ secrets.LOVABLE_REFRESH_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/sync-to-lovable.js ${{ secrets.LOVABLE_PROJECT_ID }}

      - name: Summary
        if: always()
        run: |
          echo "=== BYmyCAR Tools Catalogue — Build terminée ==="
          echo "JSON disponible à :"
          echo "  https://raw.githubusercontent.com/${{ github.repository }}/main/dist/tools-catalogue.json"
          echo "  (ou via GitHub Pages après déploiement)"
